; Sticky Reminders — a reminder appliance for the Sticky (Seeed reTerminal
; Sticky) board, built on the FreeInk SDK.
;
; [base] mirrors the FreeInk SDK's verified toolchain; the sticky env adds the
; device flag plus the Rtc and Buzzer libraries this app uses. Paths point at
; the freeink-sdk/ git submodule.

; Optional machine-local overrides (e.g. build against a working SDK checkout
; instead of the submodule). The glob matches nothing when the file is absent.
[platformio]
extra_configs = platformio.local*.ini

[base]
; pioarduino Arduino-ESP32 platform (Arduino core 3.3.x / ESP-IDF 5.5.x).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
  -std=gnu++2a
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; Single framebuffer: the controller's RAM holds the previous frame.
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1

build_unflags =
  -std=gnu++11

board_build.flash_mode = dio
board_build.flash_size = 16MB

lib_deps =
  BoardConfig=symlink://freeink-sdk/libs/hardware/BoardConfig
  EInkDisplay=symlink://freeink-sdk/libs/display/FreeInkDisplay
  InputManager=symlink://freeink-sdk/libs/hardware/InputManager
  FreeInkUI=symlink://freeink-sdk/libs/ui/FreeInkUI

; --- Sticky (Seeed reTerminal Sticky) — ESP32-S3R8, SSD1677 + GT911 ----------
; Touch, RTC and buzzer capabilities default on for this device profile.
[env:sticky]
extends = base
board = esp32-s3-devkitc1-n16r8
board_build.mcu = esp32s3
build_flags =
  ${base.build_flags}
  -DFREEINK_DEVICE_STICKY=1
lib_deps =
  ${base.lib_deps}
  Rtc=symlink://freeink-sdk/libs/hardware/Rtc
  Buzzer=symlink://freeink-sdk/libs/hardware/Buzzer
  Icons=symlink://freeink-sdk/libs/assets/Icons
